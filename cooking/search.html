function renderResults(matches) {
  const container = document.getElementById('search-results');
  const stats = document.getElementById('search-stats');

  if (!matches.length) {
    container.innerHTML = '<p class="cooking-tagline">No recipes found.</p>';
    stats.textContent = '';
    return;
  }

  stats.textContent = matches.length + ' recipe' + (matches.length === 1 ? '' : 's') + ' found';

  container.innerHTML = matches.slice(0, 100).map(r => `
    <a href="recipes/${r.slug}.html" class="essay-card">
      <span class="category-dot" style="background: var(--cyan);"></span>
      <div class="essay-content">
        <h3>${r.name}</h3>
        <p>${[r.chef, r.category, r.origin, r.source].filter(Boolean).join(' · ')}</p>
      </div>
      <span class="piece-date">${r.dish_type || ''}</span>
    </a>
  `).join('') + (matches.length > 100 ? '<p class="cooking-tagline">Showing first 100 of ' + matches.length + ' results.</p>' : '');
}

document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    document.getElementById('search-results').innerHTML =
      '<p class="cooking-tagline" id="search-placeholder">Type to search ' + recipes.length + ' recipes...</p>';
    document.getElementById('search-stats').textContent = '';
    return;
  }
  const terms = q.split(/\s+/);
  const matches = recipes.filter(r => {
    const hay = r.search.toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  renderResults(matches);
});
</script>
