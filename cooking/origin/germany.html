<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germany — Sterngold's Cooking</title>
  <meta name="description" content="A professional kitchen archive by Vlad Sterngold. 758 recipes from Restaurant Vijf, Tschuggen Grand Hotel, DCT, and beyond.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../css/cooking.css">
</head>
<body>

  <nav class="site-nav">
    <div class="container nav-inner">
      <a href="../index.html" class="nav-name">Sterngold's Cooking</a>
      <div class="nav-links">
        <a href="../../index.html" class="nav-back">&larr; sterngold.nl</a>
        <a href="../index.html">Archive</a>
        <a href="../dictionary.html">Dictionary</a>
        <a href="../gallery.html">Gallery</a>
        <a href="../search.html">Search</a>
      </div>
    </div>
  </nav>

  

  <section class="cooking-hero" style="padding-bottom: 2rem;">
    <div class="container">
      <span class="section-label reveal">Origin</span>
      <h1 class="gradient-text reveal">🇩🇪 Germany</h1>
      <p class="cooking-tagline reveal">1 recipes</p>
    </div>
  </section>

  <!-- Filter by content level -->
  
  <section style="padding: 0;">
    <div class="container">
      <div class="filter-pills reveal" id="content-filter">
        <button class="filter-pill active" data-content="all">All (1)</button>
        <button class="filter-pill" data-content="with-content">With recipes (530)</button>
      </div>
    </div>
  </section>
  

  <!-- Filter by dish type -->
  

  <div class="container"><hr class="spectrum-line-thin"></div>

  <section class="writing-grid-section">
    <div class="container">
      <div class="writing-grid">
        
        <a href="../recipes/magnolia-green-dressing.html" class="essay-card reveal" data-dtype="sauce-cold" data-content-level="full">
          <span class="category-dot" style="background: var(--cyan);"></span>
          <div class="essay-content">
            <h3>Magnolia Green Dressing</h3>
            <p>
              Dennis
              
               &middot; Germany
            </p>
          </div>
          <span class="piece-date">Sauce cold</span>
        </a>
        
      </div>
    </div>
  </section>



  <footer>
    <p>&copy; Sterngold's Cooking &middot; Archive from Anders Star V.O.F. (2003–2008)</p>
  </footer>

  <script src="../../js/main.js"></script>
  
<script>
document.addEventListener('DOMContentLoaded', () => {
  const cards = document.querySelectorAll('.essay-card');
  let activeContent = 'all';
  let activeDtype = 'all';

  function applyFilters() {
    cards.forEach(card => {
      const contentMatch = activeContent === 'all' || card.dataset.contentLevel !== 'stub';
      const dtypeMatch = activeDtype === 'all' || card.dataset.dtype === activeDtype;
      card.style.display = (contentMatch && dtypeMatch) ? '' : 'none';
    });
  }

  // Content level filter
  document.querySelectorAll('#content-filter .filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('#content-filter .filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeContent = pill.dataset.content;
      applyFilters();
    });
  });

  // Dish type filter
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill[data-filter]').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeDtype = pill.dataset.filter;
      applyFilters();
    });
  });
});
</script>

</body>
</html>
